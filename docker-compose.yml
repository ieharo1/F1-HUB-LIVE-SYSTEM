services:
  web:
    build: .
    container_name: f1hub_web
    ports:
      - "8000:8000"
    environment:
      DEBUG: "1"
      DJANGO_SECRET_KEY: "super-secret-key"
      POSTGRES_DB: "f1hub"
      POSTGRES_USER: "f1hub"
      POSTGRES_PASSWORD: "f1hub"
      POSTGRES_HOST: "db"
      POSTGRES_PORT: "5432"
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: f1hub_db
    environment:
      POSTGRES_DB: "f1hub"
      POSTGRES_USER: "f1hub"
      POSTGRES_PASSWORD: "f1hub"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
